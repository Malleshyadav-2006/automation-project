app = "autopilot-backend"
primary_region = "sin"  # Singapore — closest to India

[build]

[env]
  PORT = "5000"
  NODE_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false   # IMPORTANT: keeps it running 24/7
  auto_start_machines = true
  min_machines_running = 1     # Always at least 1 machine running

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
